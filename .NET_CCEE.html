{s:'md',q:'How would you configure CORS in an ASP.NET Core Web API to allow requests from a React app running on `http://localhost:3000`? ```csharp builder.Services.AddCors(options => {     options.AddPolicy("AllowReact", policy =>         policy.WithOrigins("http://localhost:3000").AllowAnyHeader().AllowAnyMethod()); }); ```',code:'builder.Services.AddCors(options => {\n    options.AddPolicy("AllowReact", policy =>\n        policy.WithOrigins("http://localhost:3000").AllowAnyHeader().AllowAnyMethod());\n});',o:['This configuration blocks all cross-origin requests entirely', 'This defines a named CORS policy permitting requests specifically from `http://localhost:3000`, allowing any header and HTTP method, which must then be applied via `app.UseCors("AllowReact")` in the middleware pipeline', 'CORS policies cannot be scoped to specific origins', 'This automatically applies to every ASP.NET Core project with no additional setup'],a:1,e:'This code registers a named CORS policy restricting allowed origins to the specified React dev server URL while permitting any headers/methods; the policy must still be activated in the middleware pipeline (`app.UseCors(...)`) for it to take effect on incoming requests.'},
{s:'md',q:'What is Newtonsoft.Json (Json.NET) commonly used for in the context of Web APIs?',o:['Managing database connections', 'Serializing and deserializing .NET objects to/from JSON, often used as an alternative or supplement to the built-in `System.Text.Json` for more advanced or legacy serialization scenarios', 'Handling HTTP routing exclusively', 'Managing CSS bundling'],a:1,e:'Newtonsoft.Json (Json.NET) is a widely used library for converting .NET objects to and from JSON, historically the default in ASP.NET, and still commonly integrated for its rich feature set (custom converters, advanced settings) alongside or instead of the newer built-in `System.Text.Json`.'},
{s:'md',q:'How does a React frontend typically consume data from an ASP.NET Core Web API? ```javascript fetch("http://localhost:5000/api/employees")   .then(res => res.json())   .then(data => setEmployees(data)); ```',o:['React cannot make HTTP requests to external APIs', "React uses standard browser APIs like `fetch` (or libraries like Axios) to make asynchronous HTTP requests to the Web API's endpoints, then processes the returned JSON to update component state", 'This code compiles the API into the React bundle directly', 'React apps must always be served from the same server as the Web API to communicate'],a:1,e:"React (running in the browser) communicates with a separately-hosted Web API via standard HTTP calls (`fetch`/Axios/etc.), receiving JSON responses that are then used to update the component's state and re-render the UI — with CORS configured to permit this cross-origin communication if hosted on different ports/domains."},
{s:'md',q:'In an MVC + React integration architecture, what is a common division of responsibility between the two?',o:['React handles all database operations directly with no backend involvement', 'ASP.NET Core (MVC/Web API) typically handles server-side concerns — data access, business logic, security — while React manages the client-side UI, rendering, and state, communicating with the backend via API calls', 'MVC only serves static files, and React entirely replaces all backend logic', 'There is no meaningful division; both handle identical responsibilities'],a:1,e:'In this integration pattern, ASP.NET Core exposes data and business logic through Web API endpoints, while React owns the client-side rendering, component structure, and UI state, with the two communicating over HTTP — a clean separation of backend and frontend concerns.'},
{s:'md',q:'What are key considerations when implementing Authentication and Authorization in an MVC + React architecture?',o:['Authentication is unnecessary since React runs entirely in the browser', 'The backend must issue and validate credentials/tokens (e.g., via cookies or JWT) for API requests, and the React frontend must securely store and attach these credentials (e.g., in an Authorization header) to each request, while also managing UI states for authenticated vs. unauthenticated users', 'Authorization only needs to be handled in React, with no backend enforcement', 'CORS eliminates the need for any authentication mechanism'],a:1,e:"Since the backend cannot trust the client alone, it must independently validate credentials/tokens on every request (defense in depth), while the React app manages sending those credentials with requests and adjusting the UI based on the user's authenticated state — both layers work together for a secure system."},
{s:'md',q:'How does client-side routing in a React app typically interact with server-side MVC routing when integrated together?',o:['They must always use identical routing logic with no distinction', "React commonly manages its own client-side routes (e.g., via React Router) for rendering different UI views without full page reloads, while the ASP.NET Core backend separately handles API routes (and potentially a fallback route to serve the React app's entry HTML page for any non-API route)", 'MVC routing is entirely disabled once React is introduced', "React cannot have its own routing; it must rely entirely on MVC's Razor views"],a:1,e:"In a typical SPA-integrated setup, React Router manages in-browser navigation and view switching without full-page reloads, while the ASP.NET Core backend serves distinct API routes and often a catch-all fallback route that serves the React app's `index.html` for any client-side route not matching an API endpoint."},
{s:'md',q:'When structuring React components in an MVC-integrated project, what is a recommended best practice mentioned as part of "Advanced Topics"?',o:['Keep all logic and markup in a single massive component file for simplicity', 'Structure React components in a modular, reusable way (breaking down UI into smaller, focused components), alongside clear patterns for state handling, routing, and authentication — improving maintainability as the application grows', 'Avoid using any state management, always relying on global variables', 'Structuring components has no impact on maintainability'],a:1,e:'As applications grow, breaking the UI into small, focused, reusable components (each handling a clear responsibility) alongside well-defined state management, routing, and authentication patterns is essential for maintainability, testability, and team collaboration — a best practice emphasized when integrating React with an MVC backend.  ---  *End of document — 15 topic groups × 10 questions = 150 MCQs covering the full .NET 8 / C# course syllabus.*'}

SECTIONS.forEach(function(s){
  s.count = Q.filter(function(q){ return q.s === s.id; }).length;
});
var TOTAL = Q.length;
var KEYS = ["A","B","C","D"];

var DIFF = {
  easy:   { label:"Easy",     sub:"100 pts / Q",  base:100 },
  normal: { label:"Standard", sub:"150 pts / Q",  base:150 },
  hard:   { label:"Expert",   sub:"220 pts / Q",  base:220 }
};

var bestScores = {};
var state = {
  view:"home", pick:"all", diff:"normal",
  list:[], i:0, answers:[], score:0, streak:0, maxStreak:0,
  lastPts:0
};

var app = document.getElementById("app");

function esc(s){
  return String(s).replace(/[&<>]/g, function(c){
    return c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;";
  });
}
function shuffle(arr){
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function keyFor(pick, diff){ return pick + "|" + diff; }

// Build a play-ready list: shuffle question order AND shuffle each
// question's own options independently, remapping the correct index.
function buildPlayList(rawList){
  var ordered = shuffle(rawList);
  return ordered.map(function(q){
    var order = shuffle([0,1,2,3]);
    var newOptions = order.map(function(oldIdx){ return q.o[oldIdx]; });
    var newAnswer = order.indexOf(q.a);
    return { s:q.s, q:q.q, code:q.code, o:newOptions, a:newAnswer, e:q.e };
  });
}

function updateBestPill(){
  var k = keyFor(state.pick, state.diff);
  var b = bestScores[k];
  var el = document.getElementById("bestPill");
  if(el) el.textContent = b ? ("Best: " + b.score + " pts") : "Best: —";
}

function renderHome(){
  updateBestPill();
  var chips = SECTIONS.map(function(s){
    return '<button class="chip ' + (state.pick===s.id?'active':'') + '" data-pick="' + s.id + '">' +
      '<span class="num">' + s.sess + '</span>' +
      '<span>' + s.name + '</span>' +
      '<span class="qc">' + s.count + ' Q</span></button>';
  }).join("");

  var diffs = Object.keys(DIFF).map(function(k){
    var d = DIFF[k];
    return '<button class="dbtn ' + (state.diff===k?'active':'') + '" data-diff="' + k + '">' + d.label + '<small>' + d.sub + '</small></button>';
  }).join("");

  var k = keyFor(state.pick, state.diff);
  var best = bestScores[k];

  app.innerHTML =
    '<div class="card">' +
      '<p class="lead">Sharpen up. Beat your best.</p>' +
      '<p class="sub">' + TOTAL + ' questions across the whole MS.NET syllabus, including a set of advanced/expert-level questions. Answer choices are freshly shuffled every attempt, and a streak adds a bonus multiplier to your score.</p>' +
      '<p class="sec-label">Difficulty</p>' +
      '<div class="diffs">' + diffs + '</div>' +
      '<p class="sec-label">Choose a set</p>' +
      '<div class="chips">' +
        '<button class="chip full ' + (state.pick==='all'?'active':'') + '" data-pick="all">' +
          '<span class="num">ALL</span><span>Full mock test — every section</span><span class="qc">' + TOTAL + ' Q</span>' +
        '</button>' + chips +
      '</div>' +
      (best ? ('<div class="spill new" style="margin:0 0 16px;width:100%;text-align:center;padding:12px;">' +
        '<div class="v">' + best.score + ' pts</div><div class="l">Your best on this set — ' + best.pct + '% correct</div></div>') : '') +
      '<button class="btn" id="start">Start challenge →</button>' +
      '<p class="hint">Tip: press 1–4 to answer</p>' +
    '</div>';

  var picks = app.querySelectorAll("[data-pick]");
  for(var i=0;i<picks.length;i++){
    picks[i].onclick = (function(el){ return function(){ state.pick = el.dataset.pick; renderHome(); }; })(picks[i]);
  }
  var dbtns = app.querySelectorAll("[data-diff]");
  for(var j=0;j<dbtns.length;j++){
    dbtns[j].onclick = (function(el){ return function(){ state.diff = el.dataset.diff; renderHome(); }; })(dbtns[j]);
  }
  document.getElementById("start").onclick = start;
}

function start(){
  var raw = state.pick === "all" ? Q.slice() : Q.filter(function(q){ return q.s === state.pick; });
  state.list = buildPlayList(raw);
  state.i = 0;
  state.answers = new Array(state.list.length).fill(null);
  state.score = 0; state.streak = 0; state.maxStreak = 0; state.lastPts = 0;
  state.view = "quiz";
  renderQuiz();
  window.scrollTo(0,0);
}

function computePoints(){
  var d = DIFF[state.diff];
  var streakMult = 1 + Math.min(state.streak, 5) * 0.1;
  return Math.round(d.base * streakMult);
}

function renderQuiz(){
  var n = state.list.length, i = state.i, q = state.list[i];
  var chosen = state.answers[i];
  var answered = chosen !== null;
  var pct = Math.round((i / n) * 100);

  var opts = q.o.map(function(t, idx){
    var cls = "opt", mark = "";
    if(answered){
      if(idx === q.a){ cls += " correct"; mark = "✓"; }
      else if(idx === chosen){ cls += " wrong"; mark = "✗"; }
    }
    return '<button class="' + cls + '" data-opt="' + idx + '" ' + (answered?'disabled':'') + '>' +
      '<span class="key">' + KEYS[idx] + '</span><span>' + esc(t) + '</span>' +
      (mark ? '<span class="mark">' + mark + '</span>' : '') + '</button>';
  }).join("");

  var ptsLine = "";
  if(answered){
    if(chosen === q.a){
      ptsLine = '<p class="pts-float gain">+' + state.lastPts + ' pts · streak x' + state.streak + '</p>';
    } else {
      ptsLine = '<p class="pts-float zero">Incorrect — +0 pts, streak reset</p>';
    }
  }

  app.innerHTML =
    '<div class="card">' +
      '<div class="qtop">' +
        '<span class="counter">Q <b>' + (i+1) + '</b> / ' + n + '</span>' +
        '<div class="stat-row">' +
          '<span class="stat score">★ ' + state.score + '</span>' +
          '<span class="stat streak ' + (state.streak===0?'cold':'') + '">🔥 ' + state.streak + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="bar"><i style="width:' + pct + '%"></i></div>' +
      '<p class="qtext">' + esc(q.q) + '</p>' +
      (q.code ? '<pre class="code">' + esc(q.code) + '</pre>' : '') +
      '<div class="opts">' + opts + '</div>' +
      ptsLine +
      (answered ? '<div class="explain"><b>' + (chosen===q.a ? "Correct" : "Explanation") + '</b>' + esc(q.e) + '</div>' : '') +
      '<div class="nav">' +
        (i > 0 ? '<button class="btn ghost" id="prev">← Back</button>' : '') +
        '<button class="btn" id="next" ' + (answered?'':'disabled') + '>' + (i===n-1?"See results":"Next →") + '</button>' +
      '</div>' +
      '<p class="hint">' + (answered ? '' : 'Take your time — select an answer to continue') + '</p>' +
    '</div>';

  var optBtns = app.querySelectorAll("[data-opt]");
  for(var oi=0; oi<optBtns.length; oi++){
    optBtns[oi].onclick = (function(el){ return function(){ choose(+el.dataset.opt); }; })(optBtns[oi]);
  }
  var nx = document.getElementById("next"); if(nx) nx.onclick = nextQ;
  var pv = document.getElementById("prev"); if(pv) pv.onclick = function(){ state.i--; renderQuiz(); window.scrollTo(0,0); };
}

function choose(idx){
  if(state.answers[state.i] !== null) return;
  var q = state.list[state.i];
  state.answers[state.i] = idx;
  if(idx === q.a){
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    var pts = computePoints();
    state.lastPts = pts;
    state.score += pts;
  } else {
    state.streak = 0;
    state.lastPts = 0;
  }
  renderQuiz();
}

function nextQ(){
  if(state.answers[state.i] === null) return;
  if(state.i === state.list.length - 1){
    state.view = "results";
    renderResults();
    window.scrollTo(0,0);
  } else {
    state.i++;
    renderQuiz();
    window.scrollTo(0,0);
  }
}

function renderResults(){
  var n = state.list.length;
  var correct = 0;
  state.list.forEach(function(q, idx){ if(state.answers[idx] === q.a) correct++; });
  var pct = Math.round((correct / n) * 100);
  var C = 2 * Math.PI * 66, off = C * (1 - pct/100);

  var k = keyFor(state.pick, state.diff);
  var prevBest = bestScores[k];
  var isNewBest = !prevBest || state.score > prevBest.score;
  if(isNewBest) bestScores[k] = { score: state.score, pct: pct };

  var verdict, vsub;
  if(pct >= 85){ verdict = "Exam-ready 🚀"; vsub = "Strong grip on the syllabus. Push the difficulty up for a bigger score."; }
  else if(pct >= 65){ verdict = "Solid, few gaps"; vsub = "Good base — review the misses below and go again for a higher score."; }
  else if(pct >= 45){ verdict = "Getting there"; vsub = "Focus on the weak sections and run them topic-by-topic."; }
  else { verdict = "Needs revision"; vsub = "Go section-by-section from the home screen and rebuild the fundamentals."; }

  var wrong = state.list.map(function(q, idx){ return {q:q, idx:idx}; }).filter(function(x){ return state.answers[x.idx] !== x.q.a; });

  var review;
  if(wrong.length){
    review = wrong.map(function(x){
      var q = x.q, idx = x.idx, you = state.answers[idx];
      var youLine = '<div class="rl you"><span class="lab">You</span><span>' + KEYS[you] + '. ' + esc(q.o[you]) + '</span></div>';
      return '<div class="ritem"><p class="rq">' + esc(q.q) + '</p>' + youLine +
        '<div class="rl ans"><span class="lab">Answer</span><span>' + KEYS[q.a] + '. ' + esc(q.o[q.a]) + '</span></div>' +
        '<div class="rl ex"><span class="lab">Why</span><span>' + esc(q.e) + '</span></div></div>';
    }).join("");
  } else {
    review = '<div class="allright">✓ Clean sweep — every answer correct.</div>';
  }

  app.innerHTML =
    '<div class="card">' +
      '<div class="score-ring"><div class="ring">' +
        '<svg width="150" height="150">' +
          '<circle cx="75" cy="75" r="66" stroke="#ece7fb" stroke-width="12" fill="none"/>' +
          '<circle cx="75" cy="75" r="66" stroke="url(#g)" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="' + off + '"/>' +
          '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d3cf0"/><stop offset="1" stop-color="#4527a0"/></linearGradient></defs>' +
        '</svg>' +
        '<div class="pct"><div><div class="big">' + pct + '%</div><div class="sm">' + correct + ' / ' + n + ' correct</div></div></div>' +
      '</div></div>' +
      '<p class="verdict">' + verdict + (isNewBest ? " · 🏆 New Best!" : "") + '</p>' +
      '<p class="vsub">' + vsub + '</p>' +
      '<div class="score-panel">' +
        '<div class="spill ' + (isNewBest?'new':'') + '"><div class="v">' + state.score + '</div><div class="l">Points</div></div>' +
        '<div class="spill"><div class="v">' + state.maxStreak + '</div><div class="l">Best streak</div></div>' +
        '<div class="spill"><div class="v">' + DIFF[state.diff].label + '</div><div class="l">Mode</div></div>' +
