    margin-left:auto;font-family:var(--mono);font-size:11.5px;font-weight:600;
    background:#ece5ff;color:var(--accent-deep);border-radius:99px;padding:6px 12px;
    display:flex;align-items:center;gap:5px;flex:none;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:18px;

  .lead{font-family:var(--disp);font-size:23px;font-weight:600;letter-spacing:-.5px;margin:2px 0 4px}

    padding:12px 14px;cursor:pointer;font-family:var(--body);font-size:14.5px;
    color:var(--ink);transition:.15s;
  }
  .chip:hover{border-color:#cfc4f2;background:#f6f3ff}
  .chip.active{border-color:var(--accent);background:linear-gradient(180deg,#f3edff,#faf8ff);box-shadow:0 0 0 3px rgba(109,60,240,.12)}
  .chip .num{font-family:var(--mono);font-size:11.5px;color:var(--accent-deep);font-weight:600;background:#ece5ff;border-radius:7px;padding:3px 7px;flex:none}
  .chip .qc{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted);flex:none}

  .chip.full .qc{color:#b7aedb}
  .chip.full.active{box-shadow:0 0 0 3px rgba(109,60,240,.4)}

    padding:11px 8px;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:13px;

    font-weight:600;font-size:15px;letter-spacing:-.2px;border-radius:13px;
    padding:14px 20px;width:100%;color:#fff;
    background:linear-gradient(140deg,var(--accent),var(--accent-deep));
    box-shadow:0 8px 22px -8px rgba(69,39,160,.55);transition:.15s;

  .btn:active{transform:translateY(0)}

  .opt.wrong .mark{color:var(--no)}

  .ring .pct{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;text-align:center}
  .ring .pct .big{font-family:var(--disp);font-size:34px;font-weight:700;letter-spacing:-1px}
  .ring .pct .sm{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .verdict{text-align:center;font-family:var(--disp);font-size:20px;font-weight:600;margin:0 0 4px}
  .vsub{text-align:center;color:var(--muted);font-size:14px;margin:0 0 16px}
  .score-panel{display:flex;justify-content:center;gap:10px;margin:0 0 18px;flex-wrap:wrap}

  .spill .l{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .spill.new{border-color:var(--ok-line);background:var(--ok-bg)}
  .spill.new .v{color:var(--ok)}
  .review-h{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-deep);margin:22px 0 10px;font-weight:600}
  .ritem{border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px;background:#fffdff}
  .ritem .rq{font-size:14px;font-weight:600;margin:0 0 8px;line-height:1.4}

  .rl.you{color:var(--no)} .rl.you .lab{color:var(--no)}
  .rl.ans{color:var(--ok)} .rl.ans .lab{color:var(--ok)}
  .rl.ex{color:var(--muted)} .rl.ex .lab{color:var(--muted)}
  .allright{text-align:center;color:var(--ok);font-size:14px;font-family:var(--mono);padding:8px 0 4px}
</style>

{s:'md',q:'What does the `static` keyword mean when applied to a class member?',o:['The member belongs to each individual instance separately', 'The member belongs to the type itself rather than to any specific instance, shared across all instances', 'The member cannot be modified once set', 'The member is only accessible from derived classes'],a:1,e:'Static members are associated with the class/type as a whole rather than any individual object, so there is exactly one copy shared across all instances (and accessible without creating an instance).'},
{s:'md',q:'What is inheritance in object-oriented programming?',o:['A mechanism where a class can extend another class, acquiring its members and enabling code reuse and polymorphism', 'A way to make all fields private', 'A method of overloading operators', 'A synonym for encapsulation only'],a:0,e:'Inheritance allows a derived class to reuse and extend the members (fields, properties, methods) of a base class, forming an "is-a" relationship and enabling polymorphic behavior.'},
{s:'md',q:'What does the `sealed` keyword prevent when applied to a class?',o:['Prevents the class from having any properties', 'Prevents any other class from inheriting from it', 'Prevents the class from being instantiated', 'Prevents static members'],a:1,e:"A `sealed` class cannot be used as a base class for further inheritance, which can be a deliberate design choice to lock down a class's hierarchy for security or design clarity."},
{s:'md',q:'What is the difference between using `new` and `override` when a derived class redefines a base class method?',o:['They behave identically in all cases', "`new` hides the base method (base reference calls still invoke the base version), while `override` truly replaces the base's virtual/abstract implementation (base reference calls invoke the derived version) — polymorphism only works correctly with `override`", '`new` can only be used with static methods', '`override` is only valid on properties, never methods'],a:1,e:'`override` participates in polymorphic dispatch — calling the method via a base-class reference still invokes the derived implementation — whereas `new` merely hides the base method, so calls through a base reference still invoke the base version, breaking polymorphic expectations.'},
{s:'md',q:'What is an abstract class?',o:['A class that can never have any implemented methods', 'A class that cannot be instantiated directly and may contain abstract (unimplemented) members that derived classes must implement, alongside possibly-implemented members', 'A class only used for static members', 'A synonym for an interface with no differences'],a:1,e:'Abstract classes serve as a base for derived types, potentially defining some concrete behavior while requiring subclasses to implement any declared abstract methods — they cannot be instantiated on their own.'},
{s:'md',q:'What access specifier allows a member to be accessed only within the same class and by derived classes, but not by outside code?',o:['`public`', '`private`', '`protected`', '`internal` only'],a:2,e:'`protected` members are visible to the declaring class and any classes that inherit from it, but not to unrelated external code — supporting encapsulation while still enabling inheritance-based reuse.'},
{s:'md',q:'In a constructor hierarchy, what happens when a derived class is instantiated? ```csharp class Animal { public Animal() { Console.WriteLine("Animal"); } } class Dog : Animal { public Dog() { Console.WriteLine("Dog"); } } new Dog(); ```',code:'class Animal { public Animal() { Console.WriteLine("Animal"); } }\nclass Dog : Animal { public Dog() { Console.WriteLine("Dog"); } }\nnew Dog();',o:['Only "Dog" is printed', '"Animal" is printed first (base constructor runs implicitly before the derived constructor body), then "Dog"', 'Only "Animal" is printed', 'It causes a compile-time error'],a:1,e:"Unless explicitly directed otherwise (e.g., `: base(args)`), the base class's parameterless constructor runs automatically before the derived class constructor's body executes, ensuring the base portion of the object is initialized first."},
{s:'md',q:'What is the purpose of a static constructor in C#?',o:['It runs every time a new instance is created, like a regular constructor', 'It runs exactly once, automatically, before the first instance is created or any static member is accessed, typically used to initialize static data', 'It must always be called manually by the developer', 'Static constructors can accept parameters just like instance constructors'],a:1,e:'A static constructor (with no access modifier or parameters) is invoked by the runtime at most once, before the class is first used, ideal for one-time initialization of static fields.'},
{s:'md',q:'Why might a method be marked `sealed` in a derived class, even though `sealed` is normally associated with classes?',o:['`sealed` cannot be applied to methods, only classes', 'A `sealed override` method prevents further overriding of that specific method in any classes that derive further down the hierarchy, while still allowing the class itself to be inherited', 'It makes the method static', 'It has no effect when applied to methods'],a:1,e:'Applying `sealed` to an overriding method locks in that particular implementation for all further subclasses, even though the containing class itself may still be extended — providing fine-grained control over what can and cannot be further overridden.'},
{s:'md',q:'Given a static field shared across all instances, what output would you expect from the following? ```csharp class Counter {     public static int Count = 0;     public Counter() { Count++; } } new Counter(); new Counter(); new Counter(); Console.WriteLine(Counter.Count); ```',code:'class Counter {\n    public static int Count = 0;\n    public Counter() { Count++; }\n}\nnew Counter(); new Counter(); new Counter();\nConsole.WriteLine(Counter.Count);',o:['0', '1', '3', 'A compile-time error'],a:2,e:'Since `Count` is static, it is shared across all `Counter` instances rather than being reset per object; each constructor call increments the same underlying field, resulting in 3 after three instantiations.  ---  ## 5. Session 5: Interfaces & Operator Overloading'},
{s:'md',q:'What is an interface in C#?',o:['A concrete class with full implementations only', 'A contract defining a set of members (methods, properties, events) that implementing classes/structs must provide', 'A type of static class', 'A synonym for a namespace'],a:1,e:'An interface declares a contract of members without (traditionally) providing implementation, and any class or struct implementing it commits to providing that behavior.'},
{s:'md',q:'How does a class indicate it implements an interface?',o:['By using the `extends` keyword', 'By listing the interface name after a colon in the class declaration, the same syntax used for class inheritance', 'By using the `implements` keyword', 'Interfaces cannot be implemented by classes, only structs'],a:1,e:'C# uses a unified colon syntax for both class inheritance and interface implementation, e.g., `class Dog : Animal, IComparable { ... }`.'},
{s:'md',q:'Can a C# class implement multiple interfaces?',o:['No, only one interface per class is allowed', 'Yes, a class can implement any number of interfaces, unlike single class inheritance', 'Only if all interfaces are sealed', 'Only structs can implement multiple interfaces'],a:1,e:'Unlike single inheritance for classes, C# allows a class (or struct) to implement multiple interfaces simultaneously, enabling multiple contracts to be fulfilled by one type.'},
{s:'md',q:'What is "explicit interface implementation"?',o:['Implementing an interface member such that it can only be accessed through a reference of the interface type, not through the class type directly', 'A way to prevent any class from implementing an interface', 'A syntax error in C#', 'Only applicable to abstract classes'],a:0,e:"Explicit implementation (`void IShape.Draw() { ... }`) hides the member from the class's own public surface, making it accessible only via a variable typed as the interface — useful for resolving naming conflicts between multiple interfaces."},
{s:'md',q:'What are default interface methods (introduced in C# 8+)?',o:['Methods that must be implemented by every implementing class with no exceptions', 'Methods with a body provided directly in the interface itself, which implementing classes/structs may optionally override', 'A way to make interfaces behave exactly like abstract classes with no distinction', 'Methods that only work on structs'],a:1,e:'Default interface methods let an interface provide a concrete implementation, allowing types that implement the interface to use it as-is or override it, easing API evolution without breaking existing implementers.'},
{s:'md',q:'What does implementing `IComparable<T>` typically enable for a custom class?',o:['Automatic serialization to JSON', 'The ability to compare instances of the class for ordering (e.g., via `CompareTo`), enabling use with sorting methods like `Array.Sort`', 'Automatic garbage collection tuning', 'Thread-safety guarantees'],a:1,e:'`IComparable<T>` requires implementing `CompareTo(T other)`, defining a natural ordering for the type so that framework sorting/comparison utilities can operate on collections of that type.'},
{s:'md',q:'What is operator overloading used for? ```csharp public static Point operator +(Point a, Point b) => new Point(a.X + b.X, a.Y + b.Y); ```',code:'public static Point operator +(Point a, Point b) => new Point(a.X + b.X, a.Y + b.Y);',o:['It allows custom types to support standard operators (like `+`) with meaningful, type-specific behavior', 'It changes how the `+` operator behaves for built-in types like `int`', 'It is only valid for interfaces', 'It cannot be `static`'],a:0,e:'Operator overloading lets a custom type define what an operator like `+` means for its instances (e.g., adding two `Point` objects component-wise), and must be declared as a `public static` method.'},
{s:'md',q:'Why does interface inheritance allow one interface to extend another? ```csharp interface IAnimal { void Eat(); } interface IPet : IAnimal { void Play(); } ```',code:'interface IAnimal { void Eat(); }\ninterface IPet : IAnimal { void Play(); }',o:['It is not allowed; interfaces cannot inherit from other interfaces', "It lets `IPet` build on `IAnimal`'s contract, so any class implementing `IPet` must also provide `Eat()` and `Play()`, composing broader contracts from smaller ones", 'It automatically provides implementations for both methods', 'It restricts `IPet` to only being implemented by `IAnimal` subclasses'],a:1,e:'Interfaces can inherit from other interfaces, combining their member requirements; a class implementing `IPet` must satisfy the full combined contract from both `IPet` and `IAnimal`.'},
{s:'md',q:'What is the significance of implementing `IDisposable` correctly for a class managing unmanaged resources?',o:['It has no real benefit beyond code style', 'It provides a standard `Dispose()` method that callers (often via a `using` statement) can invoke to deterministically release resources like file handles or database connections, preventing resource leaks', 'It is only relevant for GUI applications', 'It replaces the need for constructors'],a:1,e:"`IDisposable` establishes a consistent pattern (`Dispose()`) for releasing scarce resources promptly and deterministically, especially important for resources the garbage collector doesn't automatically know how to release (e.g., file handles, network sockets)."},
{s:'md',q:'Why might overloading both `==` and `!=` operators together be considered a best practice in C#?',o:['C# requires overloading exactly one of them, never both', 'Since `==` and `!=` are logical complements, overloading one without the other can lead to inconsistent or confusing comparison behavior; the compiler in fact requires both to be defined together', '`!=` cannot be overloaded in C# at all', 'There is no relationship between the two operators'],a:1,e:'C# enforces that if you overload `==`, you must also overload `!=` (and typically override `Equals`/`GetHashCode`), ensuring consistent, symmetric comparison semantics for the type.  ---  ## 6. Session 6: Value & Reference Types, Arrays, Indexers'},
{s:'md',q:'What is the fundamental difference between a value type and a reference type in C#?',o:['Value types are always stored on the heap, reference types on the stack', 'Value types hold their data directly (typically on the stack), while reference types hold a reference/pointer to data stored on the heap', 'There is no difference; the terms are interchangeable', 'Reference types cannot be null'],a:1,e:'Value types (like `int`, `struct`) contain their actual data inline, while reference types (like `class`) store a reference to an object allocated on the managed heap — this affects copying behavior and default nullability.'},
{s:'md',q:'What keyword defines a value type that groups related data without the overhead of a full class?',o:['`class`', '`struct`', '`interface`', '`enum` only'],a:1,e:'`struct` defines a lightweight value type suitable for small, immutable-ish data groupings, avoiding heap allocation and garbage collection overhead associated with classes.'},
{s:'md',q:'What does the `ref` keyword do when used with a method parameter?',o:['It passes a copy of the value, and changes inside the method are not reflected outside', "It passes the parameter by reference, so changes made inside the method are reflected in the caller's variable, and the variable must be initialized before the call", 'It only works with reference types', 'It is identical to `out` with no differences'],a:1,e:"`ref` passes the actual variable (not a copy) by reference, meaning modifications within the method affect the caller's original variable; unlike `out`, the variable must already be assigned before being passed."},
{s:'md',q:'How does `out` differ from `ref`?',o:['They are functionally identical in every respect', '`out` does not require the variable to be initialized before the call, but the method must assign it before returning, whereas `ref` requires prior initialization', '`out` can only be used with value types', '`ref` cannot return values to the caller'],a:1,e:'`out` parameters let the caller pass an unassigned variable, with the contract that the called method must assign it before it returns, unlike `ref`, which requires the variable to already hold a value going in.'},
{s:'md',q:'What is a nullable value type, e.g., `int?`?',o:['A reference type that can never be null', 'A value type wrapped to additionally allow a `null` value, implemented via `Nullable<T>`', 'A syntax error in C#', 'Only applicable to `string`'],a:1,e:'`int?` is shorthand for `Nullable<int>`, allowing a normally non-nullable value type to also represent the absence of a value (`null`), commonly used for optional data like database fields.'},
{s:'md',q:'What does the null-coalescing assignment operator `??=` do? ```csharp int? x = null; x ??= 10; ```',code:'int? x = null;\nx ??= 10;',o:['It always overwrites `x` with 10, regardless of its current value', 'It assigns 10 to `x` only if `x` is currently `null`; otherwise `x` keeps its existing value', 'It throws an exception if `x` is null', 'It is equivalent to `x = 10` unconditionally in every case'],a:1,e:'`??=` assigns the right-hand value only when the left-hand variable is currently `null`, providing a concise shorthand for "set a default if not already set."'},
{s:'md',q:'What is the difference between a jagged array and a multidimensional array in C#?',o:['They are the same thing with different syntax only', 'A jagged array is an array of arrays, where each inner array can have a different length, while a multidimensional array (e.g., `int[,]`) has a fixed rectangular shape with uniform dimension sizes', 'Jagged arrays cannot store value types', 'Multidimensional arrays are always faster with no exceptions'],a:1,e:'Jagged arrays (`int[][]`) allow each row to be an independently-sized array, offering flexibility, while multidimensional/rectangular arrays (`int[,]`) enforce a consistent, grid-like size across all rows and columns.'},
{s:'md',q:'What does a custom indexer allow a class to do? ```csharp public string this[int index] {     get => _data[index];     set => _data[index] = value; } ```',code:'public string this[int index] {\n    get => _data[index];\n    set => _data[index] = value;\n}',o:['It allows instances of the class to be accessed using array-like bracket syntax, e.g., `myObj[0]`', 'It overloads the `+` operator', 'It replaces the need for properties entirely', 'It is only valid on static classes'],a:0,e:'An indexer (`this[...]`) enables a class or struct instance to support subscript/bracket access syntax similar to arrays, encapsulating custom logic for how elements are retrieved or set by index.'},
{s:'md',q:'How do C# 8+ indices and ranges (`^` and `..`) simplify array access? ```csharp int[] arr = {1,2,3,4,5}; var last = arr[^1]; var slice = arr[1..3]; ```',code:'int[] arr = {1,2,3,4,5};\nvar last = arr[^1];\nvar slice = arr[1..3];',o:['They have no practical use over traditional indexing', '`^1` refers to the last element from the end, and `1..3` extracts a range/slice of elements, both without manually computing lengths or writing loops', 'They only work with `List<T>`, never arrays', '`^1` and `arr.Length - 1` behave completely differently'],a:1,e:'The `^` operator provides "from the end" indexing (`^1` = last element), and range syntax (`start..end`) extracts a sub-array/span concisely, reducing manual off-by-one-prone index arithmetic.'},
{s:'md',q:'Why is understanding value vs. reference type semantics important when passing a `struct` to a method without `ref`?',o:['Structs are always passed by reference automatically, just like classes', "Since structs are value types, passing one without `ref`/`in`/`out` copies its entire contents, so changes made inside the method do not affect the caller's original struct", 'Passing a struct by value causes a compile-time error', 'Structs cannot be passed as method parameters at all'],a:1,e:'Because structs are value types, a plain (non-`ref`) parameter receives a full copy of the data; any mutation inside the method only affects that local copy, not the original variable in the caller — a common source of subtle bugs if misunderstood.  ---  ## 7. Session 7: Generics & Collections'},
{s:'md',q:'What is the main benefit of generic classes/methods in C#?',o:['They eliminate the need for any type checking whatsoever', 'They allow classes and methods to operate on a type parameter specified at usage time, providing type safety and reusability without code duplication for each type', 'They can only be used with primitive types', 'They make code run without compilation'],a:1,e:'Generics (e.g., `List<T>`) let a single class or method definition work with any specified type while still providing compile-time type checking, avoiding the need to write separate versions for `int`, `string`, etc.'},
{s:'md',q:'What is a generic constraint, e.g., `where T : IComparable<T>`?',o:['A rule that restricts what types can be used as the type argument for a generic type/method, ensuring certain capabilities are guaranteed', 'A way to make a generic type non-generic', 'A syntax error', 'A constraint that only applies to interfaces, never classes'],a:0,e:'Constraints restrict the set of types usable as `T`, guaranteeing the compiler that certain members/behaviors (like `CompareTo` from `IComparable<T>`) are available for use within the generic code.'},
{s:'md',q:'Which is a generic collection interface in .NET?',o:['`IList` (non-generic)', '`IList<T>`', '`ArrayList`', '`Hashtable`'],a:1,e:'`IList<T>` is the generic counterpart to the older non-generic `IList`, providing type-safe, strongly-typed list operations without boxing/unboxing overhead for value types.'},
{s:'md',q:'Why are generic collections (like `List<T>`) generally preferred over non-generic ones (like `ArrayList`)?',o:['Generic collections are always slower', 'Generic collections provide compile-time type safety and avoid boxing/unboxing overhead for value types, unlike non-generic collections which store everything as `object`', 'Non-generic collections cannot store reference types', 'There is no practical difference between them'],a:1,e:'Generic collections enforce a specific element type at compile time (catching type errors early) and avoid the performance cost of boxing value types into `object` and unboxing them back, which non-generic collections like `ArrayList` incur.'},
{s:'md',q:'What does `IDictionary<TKey, TValue>` represent?',o:['An ordered list with duplicate values allowed', 'A collection of key-value pairs where each key is unique, allowing efficient lookup by key', 'A single value container', 'A read-only array'],a:1,e:'`IDictionary<TKey, TValue>` defines a contract for key-value collections (like `Dictionary<TKey, TValue>`) supporting fast lookups, insertion, and removal by unique key.'},
{s:'md',q:'How does `foreach` iterate over a collection under the hood?',o:['It requires manual index management by the developer', "It uses the collection's enumerator (via `IEnumerable`/`IEnumerable<T>`), calling `MoveNext()` and `Current` repeatedly until iteration completes", 'It only works on arrays, not other collections', 'It converts the collection to a string first'],a:1,e:'The `foreach` statement is syntactic sugar over obtaining an enumerator from the collection (`GetEnumerator()`) and repeatedly calling `MoveNext()`/`Current` to traverse elements, working with any type implementing `IEnumerable`/`IEnumerable<T>`.'},
{s:'md',q:'What does a Tuple allow a method to do? ```csharp (string name, int age) GetPerson() => ("Amit", 30); var person = GetPerson(); Console.WriteLine(person.name); ```',code:'(string name, int age) GetPerson() => ("Amit", 30);\nvar person = GetPerson();\nConsole.WriteLine(person.name);',o:['Return only a single value from a method', 'Return multiple values from a single method call as a lightweight, named grouping, without defining a separate class', 'Only work with reference types', 'Replace all classes entirely'],a:1,e:'Tuples (especially C# 7+ named value tuples) let a method conveniently return multiple related values without the ceremony of declaring a dedicated class or using `out` parameters.'},
{s:'md',q:'What is a generic method, as distinct from a generic class? ```csharp public T Max<T>(T a, T b) where T : IComparable<T> => a.CompareTo(b) > 0 ? a : b; ```',code:'public T Max<T>(T a, T b) where T : IComparable<T> => a.CompareTo(b) > 0 ? a : b;',o:['A method that can only exist inside a generic class', 'A method that declares its own type parameter(s), independent of whether its containing class is generic, allowing type-flexible logic at the method level', 'A method that cannot use constraints', 'A method restricted to primitive types'],a:1,e:'Generic methods introduce their own type parameters (like `<T>` on `Max`) regardless of whether the enclosing class is generic, enabling reusable, type-safe logic scoped to just that method.'},
{s:'md',q:'Why might `ICollection<T>` be used as a parameter type instead of a concrete type like `List<T>`?',o:['`ICollection<T>` has fewer capabilities than `List<T>` with no benefit', 'Coding against the more general `ICollection<T>` interface decouples the method from a specific implementation, allowing callers to pass any compatible collection type (List, HashSet, etc.)', '`ICollection<T>` cannot be enumerated', '`List<T>` cannot implement any interfaces'],a:1,e:'Accepting a broader interface type like `ICollection<T>` (or `IEnumerable<T>`) increases flexibility and testability, since callers aren\'t forced to use one specific concrete collection class, following the general principle of "program to an interface."'},
{s:'md',q:'What complexity trade-off is generally true when comparing `Dictionary<TKey,TValue>` lookups to `List<T>` linear search for finding an item?',o:['Both have identical performance characteristics always', 'Dictionary lookups by key are typically O(1) average case (hash-based), while searching an unsorted List for a value is O(n) in the worst case, making Dictionary far more efficient for frequent key-based lookups', 'List lookups are always faster than Dictionary lookups', 'Dictionary requires linear search internally too'],a:1,e:'`Dictionary<TKey,TValue>` uses hashing to achieve near-constant-time average lookups by key, whereas an unsorted `List<T>` requires scanning elements one by one (O(n)) to find a match — an important consideration when choosing the right collection for performance-sensitive code.  ---  ## 8. Session 8: Delegates & Lambdas'},
{s:'md',q:'What is a delegate in C#?',o:['A type of class that cannot have methods', 'A type-safe reference/pointer to a method with a matching signature, enabling methods to be passed as parameters or stored in variables', 'A synonym for an interface', 'A keyword used only for exception handling'],a:1,e:'A delegate defines a method signature contract; any method matching that signature can be assigned to a delegate variable and invoked indirectly, enabling flexible callback and event-driven patterns.'},
{s:'md',q:'What built-in delegate type represents a method that returns no value and takes no parameters, often used for simple callbacks?',o:['`Func<T>`', '`Action`', '`Predicate<T>`', '`Task<T>`'],a:1,e:'`Action` (with no type parameters) represents a method with a `void` return type and no parameters; overloaded `Action<T1, T2, ...>` versions accept parameters while still returning nothing.'},
{s:'md',q:'What does `Func<T, TResult>` represent?',o:['A method that takes no parameters and returns void', 'A delegate representing a method that takes a parameter of type `T` and returns a value of type `TResult`', 'A method that only works with strings', 'An event handler exclusively'],a:1,e:"`Func<T, TResult>` is a generic delegate type where the last type parameter specifies the return type, and preceding type parameters represent the method's input parameters."},
{s:'md',q:'What is a multicast delegate?',o:['A delegate that can only reference one method at a time', 'A delegate instance that holds a reference to more than one method, invoking all of them in sequence when called (using `+=` to combine)', 'A delegate exclusively for events, unrelated to regular delegates', 'A delegate that cannot be combined with others'],a:1,e:'Delegates in C# are inherently multicast — using `+=` (or `Delegate.Combine`) allows chaining multiple method references into a single delegate instance, all of which are invoked when the delegate is called.'},
{s:'md',q:'What is `Predicate<T>` typically used for?',o:['Returning any arbitrary type of result', 'Representing a method that takes a parameter of type `T` and returns a `bool`, commonly used for filtering/testing conditions', 'Representing a method with no return type', 'Representing asynchronous operations exclusively'],a:1,e:'`Predicate<T>` is a specialized delegate for boolean-returning tests (equivalent to `Func<T, bool>`), often used with methods like `List<T>.Find` or `FindAll` to filter elements matching a condition.'},
{s:'md',q:'What is an anonymous method? ```csharp Func<int, int> square = delegate(int x) { return x * x; }; ```',code:'Func<int, int> square = delegate(int x) { return x * x; };',o:['A method that must always be declared with a name at the class level', 'A method defined inline using the `delegate` keyword without a formal method name, assigned directly to a delegate variable', 'A method that can never accept parameters', 'Only usable with events, not delegates'],a:1,e:'Anonymous methods, introduced before lambdas, allow defining method logic inline (using the `delegate` keyword) without declaring a separate named method — later largely superseded by the more concise lambda syntax.'},
{s:'md',q:'How does a lambda expression simplify the same logic shown above? ```csharp Func<int, int> square = x => x * x; ```',code:'Func<int, int> square = x => x * x;',o:['Lambdas cannot be assigned to delegate types like `Func<T, TResult>`', 'The lambda syntax `x => x * x` is a concise way to define the same anonymous function, inferring parameter types and offering more readable syntax than the `delegate` keyword form', 'Lambdas only work with `void`-returning methods', 'Lambdas require explicit `return` statements at all times'],a:1,e:'Lambda expressions provide a terser, more modern syntax for defining inline functions compared to anonymous methods, and can be assigned wherever a compatible delegate type (like `Func<int,int>`) is expected.'},
{s:'md',q:'What is a practical use case for multicast delegates in combination with `Action`? ```csharp Action log = () => Console.WriteLine("Logged to console"); log += () => Console.WriteLine("Logged to file"); log(); ```',code:'Action log = () => Console.WriteLine("Logged to console");\nlog += () => Console.WriteLine("Logged to file");\nlog();',o:['Only the first assigned method will ever execute', 'Both subscribed methods execute in sequence when `log()` is called, useful for scenarios like notifying multiple independent handlers (e.g., logging to multiple destinations) of a single event', 'This code will not compile', '`+=` replaces the previous method entirely rather than adding to it'],a:1,e:'Because `Action` (like all delegates) supports multicasting via `+=`, invoking `log()` calls every subscribed method in the order they were added — a foundational mechanism behind C# events.'},
{s:'md',q:'How do lambdas capture variables from their enclosing scope (closures)? ```csharp int factor = 2; Func<int, int> multiply = x => x * factor; factor = 10; Console.WriteLine(multiply(5)); ```',code:'int factor = 2;\nFunc<int, int> multiply = x => x * factor;\nfactor = 10;\nConsole.WriteLine(multiply(5));',o:['The lambda captures the value of `factor` at the time of its creation (2), so the output is 10', "The lambda captures the variable `factor` itself (by reference to its storage), so changes to `factor` after the lambda's creation are visible when the lambda executes, producing 50", 'Lambdas cannot access variables from the enclosing scope at all', 'This causes a compile-time error'],a:1,e:'C# lambdas form closures over variables (not their values at creation time), meaning later changes to a captured variable are reflected when the lambda actually executes — here, `factor` is 10 by the time `multiply(5)` runs, yielding 50.'},
{s:'md',q:'Why might `Func<T, bool>` and `Predicate<T>` be considered functionally interchangeable, yet coexist in .NET?',o:['They serve completely unrelated purposes', 'They both represent a method taking a `T` and returning a `bool`, but `Predicate<T>` predates the generic `Func<>` family and remains for compatibility and API consistency with older methods like `List<T>.Find`', '`Func<T,bool>` cannot return a `bool`', '`Predicate<T>` can accept multiple parameters, unlike `Func<T,bool>`'],a:1,e:'`Predicate<T>` was introduced early in generics support before the more general `Func<>` delegate family existed, and many older BCL methods (like `List<T>.Find`) still use `Predicate<T>` in their signatures, so both remain in use despite functional overlap.  ---  ## 9. Session 9: Exception Handling & Events'},
{s:'md',q:'What is the purpose of a `try`-`catch` block?',o:['To always terminate the program on any error', 'To attempt code that might throw an exception, and handle that exception gracefully if it occurs, rather than crashing the application', 'To declare variables with default values', 'To define a loop structure'],a:1,e:"Code that might raise an exception is placed in a `try` block, and any thrown exception matching a `catch` clause's type is handled there, allowing the program to recover or respond appropriately instead of terminating abruptly."},
{s:'md',q:'What is the role of the `finally` block?',o:['It only runs if an exception was thrown', 'It runs regardless of whether an exception was thrown or caught, typically used for cleanup like closing resources', 'It replaces the need for a `catch` block entirely', 'It can only appear without a `try` block'],a:1,e:'Code in `finally` executes whether or not an exception occurred (and whether or not it was caught), making it ideal for guaranteed cleanup logic such as releasing file handles or connections.'},
{s:'md',q:'What is a user-defined exception class typically derived from?',o:['`System.Object` directly with no restrictions', '`System.Exception` (or a more specific existing exception subclass)', '`System.String`', 'It cannot be user-defined; only built-in exceptions exist'],a:1,e:'Custom exceptions typically extend `System.Exception` (or a relevant subclass like `ApplicationException`) to integrate properly with the standard exception-handling mechanisms and conventions.'},
{s:'md',q:'What is the difference between checked and unchecked contexts regarding arithmetic overflow in C#?',o:['They have no effect on arithmetic behavior', 'In a `checked` context, arithmetic overflow throws an `OverflowException`; in an `unchecked` context, overflow silently wraps around without an exception', '`unchecked` always throws an exception on overflow', '`checked` disables all exception handling'],a:1,e:'`checked` blocks/expressions cause overflow in integral arithmetic to throw `OverflowException`, while `unchecked` (the default in most contexts) allows values to silently wrap without any runtime error — a distinction important for numeric correctness.'},
{s:'md',q:'What is a key "don\'t" in exception handling best practices?',o:['Catching specific exception types close to where they occur', 'Using empty catch blocks that silently swallow exceptions without logging or handling them meaningfully', 'Using `finally` for cleanup', 'Throwing exceptions for genuinely exceptional conditions'],a:1,e:'Silently swallowing exceptions (empty `catch { }` blocks) hides errors and makes debugging extremely difficult; best practice is to catch specific exceptions, handle or log them meaningfully, and avoid overly broad or silent catches.'},
{s:'md',q:'What is the order of execution if multiple `catch` blocks are present? ```csharp try { ... } catch (ArgumentException ex) { ... } catch (Exception ex) { ... } ```',code:'try { ... }\ncatch (ArgumentException ex) { ... }\ncatch (Exception ex) { ... }',o:['Both catch blocks always execute for every exception', 'The runtime evaluates catch blocks top-to-bottom and executes the first one whose exception type matches (or is a base type of) the thrown exception; more specific exception types should be listed before more general ones', '`catch (Exception ex)` always executes first regardless of order', 'Only the last catch block ever executes'],a:1,e:"C# evaluates `catch` blocks in the order written and uses the first matching type; since `Exception` is a base class matching almost anything, more derived/specific exception types (like `ArgumentException`) must be listed first, or they'll never be reached."},
{s:'md',q:'What are events in C#, and how do they relate to delegates?',o:['Events are unrelated to delegates and use entirely separate mechanisms', 'Events are built on top of delegates, providing a publish-subscribe mechanism where a class can notify subscribed methods (handlers) when something happens, while restricting external code from directly invoking or overwriting the delegate', 'Events can only be raised inside constructors', 'Events cannot pass any data to handlers'],a:1,e:'An `event` is a delegate-backed member with restricted access — outside code can only subscribe (`+=`) or unsubscribe (`-=`), not directly invoke or replace the delegate — supporting a safer publish-subscribe pattern than raw delegates.'},
{s:'md',q:'How would you declare and raise a custom event in C#? ```csharp public event EventHandler<string> StatusChanged; protected virtual void OnStatusChanged(string status) => StatusChanged?.Invoke(this, status); ```',code:'public event EventHandler<string> StatusChanged;\nprotected virtual void OnStatusChanged(string status) => StatusChanged?.Invoke(this, status);',o:['This is invalid syntax; events cannot use generics', 'This declares an event using the standard `EventHandler<T>` pattern, and raises it safely using the null-conditional operator to avoid a `NullReferenceException` if no subscribers exist', '`?.Invoke` disables the event entirely', 'Events cannot be raised from within the declaring class'],a:1,e:'The pattern shown follows the conventional .NET event design (using `EventHandler<T>` and a protected `On<EventName>` method), and `?.Invoke(...)` safely checks for at least one subscriber before invoking, preventing exceptions when no handlers are attached.'},
{s:'md',q:'Why is catching `System.Exception` broadly considered an anti-pattern in most application code, except perhaps at a top-level boundary?',o:['`System.Exception` cannot be caught at all in C#', 'Catching the most general exception type can mask specific, actionable errors and unintentionally swallow bugs that should be surfaced or handled distinctly, making debugging and correct recovery harder', '`System.Exception` is deprecated in .NET 8', 'It always causes a compile-time warning that halts the build'],a:1,e:'Broadly catching `Exception` risks silently absorbing unrelated errors (like `NullReferenceException` from a bug) alongside expected ones, obscuring root causes; targeted catches for specific, anticipated exception types (with a final broad catch only at safety-net boundaries) is the recommended practice.'},
{s:'md',q:'What happens to code in a `finally` block if the corresponding `try` block contains a `return` statement? ```csharp int Test() {     try { return 1; }     finally { Console.WriteLine("Finally runs"); } } ```',code:'int Test() {\n    try { return 1; }\n    finally { Console.WriteLine("Finally runs"); }\n}',o:['The `finally` block is skipped because the method is already returning', 'The `finally` block still executes before the method actually returns the value, ensuring cleanup always happens even with an early return', 'This causes a compile-time error', "The return value becomes the finally block's return value if present"],a:1,e:'`finally` blocks are guaranteed to run even when a `try` or `catch` block contains a `return`, `break`, or `continue` — the runtime executes `finally` before control actually leaves the method, ensuring reliable cleanup logic.  ---  ## 10. Session 10: Anonymous Types, Extension Methods, Partial Classes & LINQ'},
{s:'md',q:'What is an anonymous type in C#?',o:['A named class declared without any access modifier', 'A compiler-generated type created on the fly using object initializer syntax with `var`, without an explicitly declared class', 'A synonym for `dynamic`', 'A type that cannot hold any data'],a:1,e:'Writing `var p = new { Name = "Amit", Age = 21 };` creates an anonymous type — the compiler generates a class with read-only properties matching the initializer, without the developer declaring a named class.'},
{s:'md',q:'What is an extension method?',o:["A method added directly inside an existing class's source file", 'A static method that appears to "extend" an existing type (even one you don\'t own) by using `this` before the first parameter, enabling instance-method-like call syntax', 'A method that can only extend `sealed` classes', 'A synonym for an abstract method'],a:1,e:"Extension methods are declared as static methods in static classes, with the first parameter prefixed by `this` (e.g., `this string s`), letting callers invoke them using instance-method call syntax on a type they don't control or can't modify directly."},
{s:'md',q:'What is LINQ (Language Integrated Query) used for?',o:['Managing memory allocation manually', 'Writing expressive, SQL-like queries directly in C# to filter, sort, and transform collections of data (in-memory, databases, XML, etc.)', 'Compiling C# to IL', 'Handling exceptions'],a:1,e:'LINQ provides a unified, declarative query syntax (and equivalent method-chain syntax) for querying diverse data sources — collections, databases via LINQ to Entities, XML, and more — directly within C# code.'},
{s:'md',q:'What is a partial class?',o:['A class that cannot have any methods', 'A class whose definition is split across multiple files, all combined by the compiler into a single type at compile time', 'A synonym for an abstract class', 'A class that can only have static members'],a:1,e:"The `partial` keyword allows a single class's definition to span multiple source files, which the compiler merges into one type — commonly used in designer-generated code (like Windows Forms) combined with hand-written logic."},
{s:'md',q:'What does the following LINQ query return? ```csharp var results = from p in people               where p.Age > 18               orderby p.Name               select p.Name; ```',code:'var results = from p in people\n              where p.Age > 18\n              orderby p.Name\n              select p.Name;',o:['A collection of `Person` objects sorted by age', 'A collection of names (strings) for people older than 18, sorted alphabetically by name', 'A single string containing all matching names concatenated', "It causes a runtime error since `from` isn't valid C# syntax"],a:1,e:'This query syntax filters (`where`), sorts (`orderby`), and projects (`select`) the `people` collection into a sequence of just the `Name` values for adults, ordered alphabetically.'},
{s:'md',q:'What is deferred execution in LINQ?',o:['LINQ queries execute immediately the moment they are written', "A LINQ query's actual execution is postponed until the resulting sequence is iterated (e.g., via `foreach` or calling `.ToList()`), not when the query variable is defined", 'Deferred execution means the query never runs', 'It only applies to LINQ to SQL, not LINQ to Objects'],a:1,e:'Most LINQ operators build up a query expression tree/enumerable definition without immediately running it; the actual data source is evaluated only when enumeration begins, which can lead to different results if the underlying data changes between query definition and iteration.'},
{s:'md',q:'What is the difference between LINQ query syntax and method syntax for the same logic? ```csharp var q1 = from n in numbers where n > 5 select n; var q2 = numbers.Where(n => n > 5); ```',code:'var q1 = from n in numbers where n > 5 select n;\nvar q2 = numbers.Where(n => n > 5);',o:['They produce fundamentally different results', 'They are largely equivalent — query syntax is compiler-translated into method-chain calls like `.Where()`, so both approaches typically produce the same underlying query', 'Query syntax cannot use lambdas at all', 'Method syntax cannot filter data'],a:1,e:'LINQ query syntax (`from...where...select`) is syntactic sugar that the compiler translates into equivalent extension method calls (`.Where()`, `.Select()`, etc.), so both styles are functionally interchangeable for supported operations.'},
{s:'md',q:'What is PLINQ (Parallel LINQ) designed for?',o:['Making all LINQ queries synchronous by default', 'Enabling LINQ queries to be executed in parallel across multiple threads/cores (via `.AsParallel()`), potentially improving performance for large, CPU-bound data processing', 'Only working with XML data sources', 'Replacing `async`/`await` entirely'],a:1,e:'PLINQ extends LINQ to Objects by allowing queries to be automatically partitioned and executed across multiple processor cores using `.AsParallel()`, which can significantly speed up processing of large in-memory collections for CPU-intensive operations.'},
{s:'md',q:'Why might an extension method be preferred over modifying an existing class directly to add new functionality?',o:["It's never preferred; direct modification is always better", "Extension methods let you add functionality to types you don't own the source for (like BCL types such as `string`) or to sealed classes, without altering the original type's source or breaking existing consumers", 'Extension methods can override existing instance methods', 'Extension methods require modifying the original assembly'],a:1,e:'Since extension methods are external static methods rather than true modifications to a type, they can be added to any type — including sealed or third-party classes — without needing (or being able to) access or change the original source code.'},
{s:'md',q:'Why does deferred execution sometimes cause unexpected results in LINQ queries used inside loops with changing variables? ```csharp var query = numbers.Where(n => n > threshold); threshold = 100; foreach (var n in query) { ... } // uses threshold = 100, not the value at query definition ```',code:'var query = numbers.Where(n => n > threshold);\nthreshold = 100;\nforeach (var n in query) { ... } // uses threshold = 100, not the value at query definition',o:['Deferred execution has no effect on which value of `threshold` is used', "Because the query isn't actually evaluated until enumeration, the lambda captures the variable `threshold` itself; by the time the `foreach` runs, it uses the variable's current value (100), not the value at the time the query was defined", '`threshold` must be a constant for this code to compile', 'This always throws an exception'],a:1,e:'Since the `Where` lambda closes over the variable `threshold` (not a snapshot of its value) and the query only executes upon enumeration, subsequent changes to `threshold` before iteration are reflected in the query results — a direct consequence of both closures and deferred execution.  ---  ## 11. Session 11: Reflection, Custom Attributes & File I/O'},
{s:'md',q:'What is Reflection in .NET?',o:['A compiler optimization technique', 'An API that allows a program to inspect and interact with metadata about types, methods, and assemblies at runtime', 'A method of encrypting data', 'A synonym for garbage collection'],a:1,e:'Reflection (via the `System.Reflection` namespace) enables runtime introspection of assemblies, types, and their members — allowing code to discover and even invoke members dynamically without knowing them at compile time.'},
{s:'md',q:'What is a custom attribute in C#?',o:['A special kind of loop construct', 'A class deriving from `System.Attribute` that attaches declarative metadata to code elements (classes, methods, properties, etc.), often inspected via reflection', 'A synonym for a property', 'A built-in exception type'],a:1,e:'Attributes annotate code elements with metadata (e.g., `[Obsolete]`, `[Serializable]`, or custom ones) which tools, frameworks, or reflection-based code can later read and act upon.'},
{s:'md',q:'Which namespace provides classes for reading and writing files in .NET?',o:['`System.Net`', '`System.IO`', '`System.Linq`', '`System.Reflection`'],a:1,e:'`System.IO` contains the core classes (`File`, `FileStream`, `StreamReader`, `StreamWriter`, `Directory`, etc.) for interacting with the file system, directories, and streams.'},
{s:'md',q:'What is a shared assembly in .NET?',o:['An assembly that can only be used by one application at a time', 'An assembly (often placed in the Global Assembly Cache historically, or otherwise designed for reuse) that multiple applications can reference and use in common', 'A synonym for a private field', 'An assembly that cannot contain any types'],a:1,e:'Shared assemblies are designed to be referenced and reused across multiple applications, often requiring a strong name for uniqueness and versioning guarantees (historically deployed to the GAC in .NET Framework).'},
{s:'md',q:'How would you use reflection to explore the members of a loaded type? ```csharp Type t = typeof(Employee); foreach (var m in t.GetMethods()) { Console.WriteLine(m.Name); } ```',code:'Type t = typeof(Employee);\nforeach (var m in t.GetMethods()) { Console.WriteLine(m.Name); }',o:['This code is invalid; `typeof` cannot be used with reflection', '`typeof(Employee)` obtains the `Type` object representing the `Employee` class, and `GetMethods()` returns metadata about its public methods, which can then be enumerated and inspected', 'This throws an exception unless `Employee` implements `IReflectable`', '`GetMethods()` executes every method it finds'],a:1,e:"`typeof(T)` retrieves the `System.Type` object describing a type's metadata, and reflection methods like `GetMethods()`, `GetProperties()`, etc., allow inspecting (not executing) the type's members programmatically."},
{s:'md',q:'How can reflection be used to load an assembly dynamically at runtime?',o:['It is not possible to load assemblies dynamically in .NET', 'Using methods like `Assembly.Load()` or `Assembly.LoadFrom()`, an assembly not referenced at compile time can be loaded and its types inspected/instantiated at runtime', 'Only the `using` directive can load assemblies', 'Dynamic loading requires recompiling the application'],a:1,e:'`Assembly.Load`/`Assembly.LoadFrom` (and related APIs) allow loading assemblies whose identity may not be known until runtime — a foundation for plugin architectures and other extensibility scenarios.'},
{s:'md',q:'What is the typical pattern for reading all text from a file synchronously? ```csharp string content = File.ReadAllText(@"C:\\data.txt"); ```',code:'string content = File.ReadAllText(@"C:\\data.txt");',o:['This reads the file asynchronously by default', '`File.ReadAllText` opens the file, reads its entire contents into a string, and closes the file handle automatically — a simple, synchronous, one-line approach for smaller files', 'It only works with binary files', 'It requires manually opening and closing a `FileStream`'],a:1,e:'`File.ReadAllText` is a convenience method that handles opening, reading, and properly closing the file stream internally, making it ideal for straightforward, smaller-scale text file reads.'},
{s:'md',q:'How would you define and apply a custom attribute? ```csharp [AttributeUsage(AttributeTargets.Method)] public class LogExecutionAttribute : Attribute { }  public class Service {     [LogExecution]     public void DoWork() { } } ```',code:'[AttributeUsage(AttributeTargets.Method)]\npublic class LogExecutionAttribute : Attribute { }\n\npublic class Service {\n    [LogExecution]\n    public void DoWork() { }\n}',o:['`LogExecutionAttribute` must derive from `System.Object`, not `System.Attribute`', 'This defines a custom attribute restricted (via `AttributeUsage`) to be applied only on methods, and applies it to `DoWork()`; reflection can later detect this attribute at runtime to trigger custom behavior', 'Attributes cannot be restricted to specific code element types', '`[LogExecution]` automatically logs every call without any reflection code'],a:1,e:'Custom attributes must derive from `System.Attribute`, and `AttributeUsage` restricts which code elements they can decorate; simply applying the attribute does nothing by itself — separate reflection-based code must inspect for its presence and act accordingly (e.g., via an AOP-style interceptor).'},
{s:'md',q:'Why might dynamically loading an assembly via reflection be useful in a plugin-based application architecture?',o:['It requires all plugins to be compiled into the main application ahead of time', 'It allows the host application to discover and load plugin assemblies (unknown at compile time) at runtime, invoking their types/methods dynamically to extend functionality without modifying/recompiling the host', 'Dynamically loaded assemblies cannot be unloaded or isolated', 'It eliminates the need for any interface contracts between host and plugins'],a:1,e:'Reflection-based dynamic assembly loading lets an application scan a directory (for example) for plugin DLLs unknown at build time, load them, and instantiate/invoke their types via a shared interface contract — a common foundation for extensible plugin systems.'},
{s:'md',q:'What is a key difference between using `StreamReader`/`StreamWriter` versus `File.ReadAllText`/`File.WriteAllText` for file I/O?',o:['They are functionally and performance-wise identical in every scenario', '`StreamReader`/`StreamWriter` provide finer-grained, line-by-line or buffered control suitable for large files or streaming scenarios, while `File.ReadAllText`/`WriteAllText` are simpler one-shot convenience methods best suited for smaller files loaded entirely into memory', '`StreamReader` cannot read text files, only binary', '`File.ReadAllText` cannot be used with `using` statements'],a:1,e:'`StreamReader`/`StreamWriter` allow incremental, buffered reading/writing (useful for very large files where loading everything into memory at once would be wasteful), whereas the `File.ReadAllText`/`WriteAllText` static helpers load/write the entire content in one call, best suited to smaller files.  ---  ## 12. Session 12: Threading & Tasks'},
{s:'md',q:'What is a `Thread` in .NET?',o:['A unit of database transaction', 'An independent path of execution within a process, allowing concurrent operations', 'A synonym for a method', 'A type of collection'],a:1,e:'A `System.Threading.Thread` represents an independent sequence of execution that can run concurrently with other threads within the same process, sharing process memory.'},
{s:'md',q:'What does `ThreadStart` represent?',o:['A delegate representing the method a new thread will execute, taking no parameters', 'A class for managing files', 'A synonym for `Task`', 'An attribute for marking async methods'],a:0,e:'`ThreadStart` is a delegate type used when creating a `Thread`, pointing to the parameterless method that will run on the new thread when `Start()` is called.'},
{s:'md',q:'What is the purpose of a `ThreadPool`?',o:['To create a brand-new OS thread for every single request, regardless of load', 'To maintain and reuse a pool of worker threads, reducing the overhead of constantly creating and destroying threads for short-lived tasks', 'To manage database connection pooling only', 'To handle file I/O exclusively'],a:1,e:'The `ThreadPool` maintains a set of reusable worker threads, queuing and executing short-lived tasks/work items on them, which is more efficient than manually spinning up a new native thread for every small piece of work.'},
{s:'md',q:'Why is synchronization (e.g., using `lock`) necessary when multiple threads access shared data?',o:['Synchronization is never necessary in .NET applications', 'Without synchronization, concurrent threads reading/writing shared data can cause race conditions, leading to corrupted or inconsistent data', '`lock` is only used for file access, not in-memory data', 'Threads never actually run concurrently in .NET'],a:1,e:'When multiple threads can read and modify shared state simultaneously, unsynchronized access can produce race conditions (e.g., lost updates), so mechanisms like `lock` ensure only one thread accesses the critical section at a time.'},
{s:'md',q:'What does the `lock` keyword do? ```csharp private static readonly object _sync = new object(); lock (_sync) { counter++; } ```',code:'private static readonly object _sync = new object();\nlock (_sync) { counter++; }',o:['It permanently prevents any other code from ever accessing `counter` again', 'It ensures that only one thread at a time can execute the code block while holding the lock on `_sync`, serializing access to the critical section', 'It only works with `int` variables', 'It is equivalent to declaring `counter` as `volatile`'],a:1,e:'`lock` (syntactic sugar over `Monitor.Enter`/`Monitor.Exit`) ensures mutual exclusion — only one thread can execute the locked block at a time for a given lock object, preventing concurrent, unsynchronized modification of `counter`.'},
{s:'md',q:'What is `Interlocked` used for?',o:['Managing file streams', 'Performing simple atomic operations (like increment, decrement, or compare-and-exchange) on shared variables without needing a full lock', 'Declaring generic constraints', 'Handling exceptions across threads'],a:1,e:'`Interlocked` provides lightweight, atomic operations (e.g., `Interlocked.Increment`) for simple scenarios, often faster than a full `lock` for single-variable updates since it avoids broader lock contention overhead.'},
{s:'md',q:'What is the difference between calling a function synchronously versus using `Task` with `async`/`await`? ```csharp async Task<int> GetDataAsync() {     await Task.Delay(1000);     return 42; } ```',code:'async Task<int> GetDataAsync() {\n    await Task.Delay(1000);\n    return 42;\n}',o:['`async`/`await` blocks the calling thread the entire time, just like a synchronous call', '`async`/`await` allows the calling code to continue without blocking the current thread while the awaited operation (like `Task.Delay`) completes, improving responsiveness, especially in UI or scalable server scenarios', '`Task` methods can never return a value', '`async` methods must always be `void`'],a:1,e:'`async`/`await` enables non-blocking asynchronous execution — the calling thread is freed to do other work while the awaited task completes, then resumes execution after the `await` point, unlike a fully synchronous, thread-blocking call.'},
{s:'md',q:'What is a key advantage of the Task Parallel Library (TPL) over manually managing raw `Thread` objects?',o:['TPL cannot run any code in parallel', 'TPL provides higher-level abstractions (like `Task`, `Parallel.For`, `Parallel.ForEach`) that handle thread pool management, work partitioning, and exception aggregation automatically, reducing the complexity of manual thread management', 'TPL requires more code than manual threading in every case', 'TPL only works for I/O operations, never CPU-bound work <br>'],a:1,e:'The TPL abstracts away much of the manual complexity of thread creation, pooling, and coordination, offering constructs like `Task.Run`, `Parallel.For`, and structured exception handling (`AggregateException`) that make concurrent and parallel programming considerably more approachable and robust.'},
{s:'md',q:'How does `Monitor` differ from the `lock` keyword, given that `lock` is built on `Monitor`?',o:['They are entirely unrelated APIs', '`lock` is compiler syntactic sugar for a `try/finally` wrapped around `Monitor.Enter`/`Monitor.Exit`, while using `Monitor` directly gives more explicit control (e.g., `Monitor.TryEnter` with a timeout, or `Monitor.Wait`/`Pulse` for signaling)', '`Monitor` can only be used with value types', '`lock` provides more granular control than `Monitor`'],a:1,e:'The `lock` statement is a convenient shorthand that the compiler expands into `Monitor.Enter`/`Exit` wrapped in a `try/finally` for safety; using `Monitor` directly exposes additional capabilities like timed lock attempts (`TryEnter`) or coordinating threads via `Wait`/`Pulse`, useful in more advanced synchronization scenarios.'},
{s:'md',q:'Why is `async`/`await` generally preferred over raw `Thread` creation for I/O-bound operations (like a web request or database call)?',o:['`async`/`await` and raw threads perform identically for I/O-bound work', 'I/O-bound `async` operations release the underlying thread back to the pool while waiting (rather than blocking it), making the approach far more scalable under load than dedicating an entire blocked OS thread per operation', '`async`/`await` always creates a new OS thread per call, just like `Thread`', 'Raw threads are always more efficient for I/O-bound work'],a:1,e:'For I/O-bound work, `async`/`await` (backed by asynchronous OS APIs) allows the thread to be returned to the pool while waiting for the I/O to complete, rather than sitting idle/blocked — enabling an application to handle many more concurrent I/O operations with far fewer threads than a naive one-thread-per-operation model.  ---  ## 13. Sessions 13–19 (Part 1): ASP.NET Core MVC — Controllers, Views, Models & State Management'},
{s:'md',q:'What is the role of a Controller in ASP.NET Core MVC?',o:['To directly render HTML with no logic', 'To handle incoming HTTP requests, execute application/business logic, and select an appropriate View or result to return to the client', 'To act only as a data storage layer', 'To manage database schema migrations exclusively'],a:1,e:'Controllers receive incoming requests routed to them, coordinate with models/services to process logic, and return an `ActionResult` (such as a View, JSON, or redirect) back to the client.'},
{s:'md',q:'What HTTP attribute restricts an action method to only respond to GET requests?',o:['`[HttpPost]`', '`[HttpGet]`', '`[NoAction]`', '`[HttpDelete]` only'],a:1,e:'`[HttpGet]` restricts an action method so it only handles GET requests, complementing other verb-specific attributes like `[HttpPost]`, `[HttpPut]`, and `[HttpDelete]` for RESTful action dispatch.'},
{s:'md',q:'What does `[NoAction]` do when applied to a public method in a controller?',o:['It marks the method as the default action for the controller', "It prevents the method from being treated/invoked as an action method, even though it's public, useful for helper methods that shouldn't be directly routable", 'It disables the entire controller', 'It forces the method to only run asynchronously'],a:1,e:"`[NoAction]` explicitly excludes a public controller method from being considered an invokable action by the routing system, useful when a public helper method exists on the controller but shouldn't be reachable via a URL."},
{s:'md',q:'What is the difference between a Model and a ViewModel in ASP.NET Core MVC?',o:['They are exactly the same and interchangeable in every scenario', 'A Model typically represents core domain/business data (often mirroring database entities), while a ViewModel is tailored specifically to the needs of a particular View, potentially combining or reshaping data from one or more Models', 'ViewModels can never contain validation attributes', 'Models are only used in Razor Pages, never MVC'],a:1,e:'ViewModels are designed around the specific presentation needs of a View (which might combine data from multiple sources or omit sensitive fields), whereas Models more directly represent the underlying domain/business entities, keeping view-specific concerns separate from core domain logic.'},
{s:'md',q:'What do HTML Helper functions (e.g., `@Html.TextBoxFor()`) provide in Razor Views?',o:['They compile C# code to JavaScript', 'They generate HTML markup (like form inputs) programmatically based on model properties, reducing repetitive manual HTML writing and wiring up model binding conventions', 'They handle server-side authentication', 'They replace the need for CSS entirely'],a:1,e:'HTML Helpers generate the appropriate HTML markup tied to model properties (including correct `name`/`id` attributes for model binding), reducing boilerplate and ensuring consistency between the View and the bound Model/ViewModel.'},
{s:'md',q:'What is the difference between client-side and server-side validation using Data Annotations? ```csharp public class Student {     [Required]     public string Name { get; set; } } ```',code:'public class Student {\n    [Required]\n    public string Name { get; set; }\n}',o:['Data Annotations only ever produce server-side validation with no client-side equivalent', 'The same `[Required]` attribute drives both server-side validation (checked in the controller/model binding) and, combined with jQuery Validation scripts, client-side validation in the browser before form submission, providing immediate feedback plus a guaranteed server-side safety net', 'Client-side validation replaces the need for server-side validation entirely', 'Data Annotations cannot be used for validation, only for display formatting'],a:1,e:"ASP.NET Core MVC's unobtrusive validation combines Data Annotations with client-side JavaScript libraries to validate input immediately in the browser, while the same annotations are re-checked server-side upon form submission — ensuring validation even if JavaScript is disabled or bypassed."},
{s:'md',q:'What is the difference between `TempData` and `Session` for state management in MVC?',o:['They are identical, with `TempData` just being a renamed version of `Session`', "`TempData` persists data only until it is read (typically across one subsequent request, often used for redirect scenarios), while `Session` persists data across multiple requests for the duration of a user's session until it expires or is cleared", '`TempData` persists indefinitely, unlike `Session`', '`Session` cannot store simple types like strings'],a:1,e:'`TempData` is designed for short-lived data that survives exactly one redirect (commonly for "success message after redirect" patterns) and is typically cleared after being read, whereas `Session` retains data across many requests throughout the user\'s session lifetime.'},
{s:'md',q:'What is a Partial View, and why is it useful?',o:['A View that can never be reused across multiple parent Views', 'A reusable, smaller View fragment that can be rendered within one or more parent Views (e.g., `@Html.Partial("_UserCard", user)`), promoting reuse of common UI fragments like navigation bars or item cards', 'A View that only works with static HTML, no dynamic model data', 'A synonym for a Layout page'],a:1,e:'Partial Views let developers extract reusable pieces of UI (that may still bind to model data) into separate files, which can be rendered within multiple different parent Views, reducing duplication of shared markup fragments.'},
{s:'md',q:'What is the purpose of scaffold templates in ASP.NET Core MVC?',o:['They eliminate the need to ever write custom code', 'They generate boilerplate Controller and View code (e.g., CRUD operations) based on a Model, giving developers a working starting point to then customize', 'They are only used for unit testing', 'Scaffold templates can only generate JavaScript, not C# or Razor'],a:1,e:"Visual Studio's scaffolding tools generate initial Controller actions and corresponding Views (List, Details, Create, Edit, Delete) based on a specified Model, accelerating initial CRUD development which developers then refine as needed."},
{s:'md',q:'How does Application state differ from Session state in ASP.NET Core MVC?',o:['They are functionally identical', "Application state is shared across all users and requests for the lifetime of the application (server-wide), while Session state is scoped to an individual user's session", 'Application state is scoped per-user, and Session is scoped server-wide', 'Neither Application nor Session state persists across multiple requests'],a:1,e:'Application-level state is a single shared store visible to every user and request across the entire running application instance, whereas Session state is isolated per individual user, making Application state suitable for global, shared data (with appropriate thread-safety considerations) and Session state suitable for user-specific data.  ---  ## 14. Sessions 13–19 (Part 2): Routing, ADO.NET, Entity Framework & MVC Security'},
{s:'md',q:'What is the role of the Routing Engine in ASP.NET Core MVC?',o:['It manages database connections', 'It maps incoming URL request patterns to the appropriate Controller and Action method to execute', 'It compiles Razor Views to HTML', 'It only manages static file serving'],a:1,e:'The routing engine inspects incoming request URLs against configured route patterns/templates (or attribute routes) to determine which Controller and Action should handle the request.'},
{s:'md',q:'What does a 404 error typically indicate in the context of MVC routing?',o:['A successful request with no content', 'The requested resource/route could not be matched to any existing Controller/Action or file, so nothing could be found', 'An internal server error unrelated to routing', 'A successful redirect'],a:1,e:'A 404 (Not Found) status indicates the routing system (or static file middleware) could not locate a matching endpoint or resource for the requested URL.'},
{s:'md',q:'What is Attribute Routing?',o:['Defining routes exclusively in a central `RouteConfig`-style file, with no per-action configuration', 'Defining route templates directly on Controllers/Actions using attributes like `[Route("api/[controller]")]`, giving fine-grained, co-located control over URL patterns', 'A way to disable routing entirely', 'Only usable for Razor Pages, not MVC controllers'],a:1,e:'Attribute routing lets developers specify the exact URL pattern for a controller or action directly via attributes, offering more explicit, localized control compared to purely convention-based centralized route configuration.'},
{s:'md',q:'What is the purpose of `Microsoft.Data.SqlClient` in the context of ADO.NET?',o:['It is a front-end JavaScript framework', 'It provides the classes (like `SqlConnection`, `SqlCommand`) needed to connect to and interact directly with SQL Server databases using ADO.NET', 'It is used only for in-memory caching', 'It replaces the need for Entity Framework entirely with no overlap in purpose'],a:1,e:'`Microsoft.Data.SqlClient` is the modern SQL Server data provider for ADO.NET, supplying core classes for opening connections, executing commands, and reading results directly against SQL Server, as a lower-level alternative/complement to ORMs like Entity Framework.'},
{s:'md',q:'What is the difference between `DataReader` and `DataSet`/`DataTable` in ADO.NET?',o:['They are functionally identical', '`DataReader` provides fast, forward-only, connected access to query results (reading row by row while the connection stays open), while `DataSet`/`DataTable` load data into an in-memory, disconnected representation that can be manipulated after the connection is closed', '`DataSet` is always faster than `DataReader`', '`DataReader` can be used without an open database connection'],a:1,e:'`DataReader` streams results efficiently in a forward-only, connected manner (ideal for simply reading data quickly), whereas `DataSet`/`DataTable` buffer an entire result set into memory in a disconnected model, allowing offline manipulation at the cost of higher memory use.'},
{s:'md',q:'Why might asynchronous command execution (e.g., `ExecuteReaderAsync`) be preferred in a web application?',o:['Asynchronous execution always runs slower than synchronous execution', 'It frees the calling thread to handle other work while waiting for the database operation to complete, improving the scalability of the web application under concurrent load', 'Asynchronous methods cannot return any data', 'It eliminates the need for a database connection altogether'],a:1,e:'Async database calls avoid blocking a thread while waiting on I/O (the database round-trip), allowing the web server to handle more concurrent requests with a limited thread pool — a significant scalability benefit under load.'},
{s:'md',q:'What does the `[Authorize]` attribute do in ASP.NET Core MVC? ```csharp [Authorize] public class AdminController : Controller { ... } ```',code:'[Authorize]\npublic class AdminController : Controller { ... }',o:['It makes the controller publicly accessible to anonymous users', 'It restricts access to the decorated controller/action so that only authenticated (and optionally, specifically authorized) users can invoke it, redirecting unauthenticated requests typically to a login page', 'It only affects static files, not controllers', 'It disables all actions within the controller permanently'],a:1,e:'`[Authorize]` enforces that a user must be authenticated (and can further restrict by role/policy) to access the decorated controller or action, with unauthenticated requests typically redirected to a configured login endpoint.'},
{s:'md',q:'What is the purpose of an `AntiForgeryToken` in MVC forms? ```html @Html.AntiForgeryToken() ```',o:['It encrypts the entire HTTP request body', 'It embeds a unique, per-user/session token in forms that the server validates on submission, helping prevent Cross-Site Request Forgery (CSRF) attacks where a malicious site tries to submit forms on behalf of an authenticated user', 'It replaces the need for HTTPS', 'It is only relevant for GET requests'],a:1,e:"The anti-forgery token mechanism ensures that form submissions genuinely originated from the application's own rendered form (and the legitimate user's session) rather than being forged by a malicious third-party site, a key CSRF defense."},
{s:'md',q:'How does the Entity Framework Code First approach differ from a Database First approach?',o:['They are identical processes with different names', 'In Code First, developers define C# classes (entities) first, and EF generates/migrates the database schema from them; in Database First, an existing database schema is reverse-engineered into corresponding C# entity classes', 'Code First cannot use Data Annotations or Fluent API', 'Database First requires manually writing all SQL scripts with no tooling support'],a:1,e:'Code First lets developers author POCO classes (optionally annotated or configured via Fluent API) as the source of truth, from which EF generates and evolves the database schema via migrations; Database First instead starts from an existing database and generates matching entity classes.'},
{s:'md',q:'How do Database Migrations in Entity Framework help manage schema evolution over time?',o:['Migrations require manually rewriting the entire database from scratch for every change', 'Migrations capture incremental changes to the EF model as versioned code files, which can be applied (or rolled back) to keep the actual database schema in sync with the evolving C# model over time', 'Migrations only work with SQLite, not SQL Server', 'Migrations eliminate the need for any database backups'],a:1,e:"EF Migrations track and generate incremental schema-change scripts (add columns, tables, etc.) as the C# entity model evolves, providing a version-controlled, repeatable, and reversible way to keep the physical database schema aligned with the application's data model across environments.  ---  ## 15. Sessions 20–22: Web APIs, CORS & React Integration"},
{s:'md',q:'What is the purpose of an ASP.NET Core Web API?',o:['To serve only static HTML pages with no data exchange', 'To expose HTTP endpoints (typically returning JSON/XML) that can be consumed by various clients — web frontends, mobile apps, or other services — following RESTful conventions', 'To manage server-side session state exclusively', 'To replace the need for any Controller'],a:1,e:'Web API controllers expose HTTP-based endpoints designed for data exchange (commonly JSON) with diverse clients, rather than returning full HTML views, making them well suited to serving SPAs, mobile apps, and other services.'},
{s:'md',q:'What does CORS stand for, and why is it needed?',o:['Cross-Origin Resource Sharing; a browser security mechanism that controls whether a web page from one origin can make requests to a server on a different origin', 'Client-Origin Request Sequencing; used for optimizing database access', 'Concurrent Operation Result Storage; a caching mechanism', "It's unrelated to web browsers or HTTP"],a:0,e:'CORS is a browser-enforced security feature restricting cross-origin HTTP requests by default; a server must explicitly opt in (via response headers) to allow specific origins, methods, or headers from a different domain like a React app running on a different port.'},
{s:'md',q:'Which HTTP verbs are commonly supported and distinguished in a RESTful Web API?',o:['Only GET', 'GET, POST, PUT, DELETE (and others like PATCH)', 'Only POST and GET', 'HTTP verbs are irrelevant to Web APIs'],a:1,e:'RESTful Web APIs commonly map CRUD operations to distinct HTTP verbs — GET (read), POST (create), PUT (update/replace), DELETE (remove), and sometimes PATCH (partial update) — each handled by attributed action methods.'},
